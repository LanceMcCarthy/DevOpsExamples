name: WinUI3

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "winui/*"
    paths:
      - 'src/WinUI/**/*'
      - '.github/workflows/main_build-winui.yml' 

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      TELERIK_USERNAME: "api-key" # Used by the nuget.config file
      TELERIK_PASSWORD: ${{secrets.TELERIK_NUGET_KEY}} # Used by the nuget.config file
      SLN_PATH: "src/WinUI/MyDemo.sln"
    steps:
    - name: "⬇️ Checkout"
      uses: actions/checkout@v7

    - name: "🧰 Setup .NET"
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: "➕ Add msbuild to PATH"
      uses: microsoft/setup-msbuild@v3

    - name: "📥 Restore NuGet packages"
      shell: pwsh
      run: dotnet restore ${{env.SLN_PATH}} --configfile "src/NuGet.Config"

    # Using /t:Restore restores the application to populate the obj folder with RuntimeIdentifiers
    - name: "📥 Restore RIDs"
      run: msbuild ${{env.SLN_PATH}} /t:Restore /p:Configuration=Release

    - name: "📦 Build and Create MSIX"
      run: |
        msbuild ${{env.SLN_PATH}} `
          /p:Configuration=Release `
          /p:Platform=x64 `
          /p:AppxBundlePlatforms="x64|arm64" `
          /p:UapAppxPackageBuildMode=CI `
          /p:AppxBundle=Never `
          /p:AppxPackageDir="${{github.workspace}}/AppPackages" `
          /p:GenerateAppxPackageOnBuild=true `
          /p:AppxPackageSigningEnabled=false `
          /p:SelfContained=true 
      env:
        TELERIK_LICENSE: ${{secrets.TELERIK_LICENSE_KEY}}
